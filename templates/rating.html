<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shutdown Rating</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page">

    <div class="topbar">
        <div class="logo">MARLU GROUP</div>
        <div class="title">Enter Employee Ratings</div>
    </div>

    <div class="section-title">Shutdown</div>

    <form method="POST" action="/submit">

        <div class="filters filters-two">
            <div class="field">
                <label>Select Shutdown</label>
                <select name="job" id="jobSelect" required>
                    <option value="">Select shutdown</option>
                    {% for c in contracts %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field">
                <label>Supervisor Name</label>
                <input
                    type="text"
                    name="supervisor"
                    id="supervisorInput"
                    list="supervisorList"
                    placeholder="Type supervisor name"
                    required
                >
                <datalist id="supervisorList"></datalist>
            </div>
        </div>

        <div class="rating-note">
            Rating 1-5:
            <span>1=Excellent</span>
            <span>2=Exceeds expectation</span>
            <span>3=Meets expectation</span>
            <span>4=Often does not meet expectation</span>
            <span>5=Poor</span>
        </div>

        <div class="personnel-title">Personnel</div>

        <div class="table-wrap">
            <table id="workerTable">
                <thead>
                    <tr>
                        <th class="col-name">Name</th>
                        <th class="col-position">Position</th>
                        <th class="col-rating">Overall Rating</th>
                        <th class="col-comments">Comments</th>
                    </tr>
                </thead>
                <tbody id="workerBody"></tbody>
            </table>
        </div>

        <div class="actions">
            <button type="submit" class="save-btn">Save Ratings</button>
        </div>

    </form>
</div>

<script>
const jobSelect = document.getElementById("jobSelect");
const workerBody = document.getElementById("workerBody");
const supervisorList = document.getElementById("supervisorList");

function ratingOptions(name) {
    return `
        <select name="${name}" class="rating-select">
            <option value=""></option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
    `;
}

function renderWorkers(workers) {
    workerBody.innerHTML = "";

    if (!workers || workers.length === 0) {
        workerBody.innerHTML = `
            <tr>
                <td colspan="4" class="empty-note">No workers found for this shutdown</td>
            </tr>
        `;
        return;
    }

    workers.forEach(w => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td class="cell-name">
                <div class="cell-text-left">
                    ${w.Name || ""}
                    <input type="hidden" name="name" value="${w.Name || ""}">
                </div>
            </td>

            <td class="cell-position">
                <div class="cell-text-left">
                    ${w.Position || ""}
                    <input type="hidden" name="position" value="${w.Position || ""}">
                </div>
            </td>

            <td class="cell-rating">
                <div class="rating-wrap">
                    ${ratingOptions("overall_rating")}
                </div>
            </td>

            <td class="cell-comments">
                <div class="comments-wrap">
                    <input
                        type="text"
                        name="comments"
                        class="comments-input"
                        placeholder="Optional comments"
                    >
                </div>
            </td>
        `;

        workerBody.appendChild(row);
    });
}

jobSelect.addEventListener("change", async function () {
    const job = this.value;

    if (!job) {
        workerBody.innerHTML = "";
        supervisorList.innerHTML = "";
        return;
    }

    try {
        const res = await fetch(`/get_project_data?project=${encodeURIComponent(job)}`);
        const data = await res.json();

        renderWorkers(data.workers || []);

        supervisorList.innerHTML = "";
        [...(data.leaders || []), ...(data.workers || [])].forEach(p => {
            const o = document.createElement("option");
            o.value = p.Name;
            supervisorList.appendChild(o);
        });
    } catch (err) {
        console.error("Failed to load project data:", err);
        workerBody.innerHTML = `
            <tr>
                <td colspan="4" class="empty-note">Failed to load workers</td>
            </tr>
        `;
    }
});
</script>

</body>
</html>
