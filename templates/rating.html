<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shutdown Rating</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page">

    <div class="topbar">
        <div class="logo">MARLU GROUP</div>
        <div class="title">Enter Employee Ratings</div>
    </div>

    <div class="section-title">Shutdown</div>

    <form method="POST" action="/submit" id="ratingForm">

        <div class="filters filters-two">
            <div class="field">
                <label for="jobSelect">Select Shutdown</label>
                <select name="job" id="jobSelect" required>
                    <option value="">Select shutdown</option>
                    {% for c in contracts %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field">
                <label for="supervisorInput">Supervisor Name</label>
                <input
                    type="text"
                    name="supervisor"
                    id="supervisorInput"
                    list="supervisorList"
                    placeholder="Type supervisor name"
                    autocomplete="off"
                    required
                >
                <datalist id="supervisorList"></datalist>
            </div>
        </div>

        <div class="rating-note">
            <strong>Rating 1-5:</strong>
            <span>1 = Excellent</span>
            <span>2 = Exceeds expectation</span>
            <span>3 = Meets expectation</span>
            <span>4 = Often does not meet expectation</span>
            <span>5 = Poor</span>
        </div>

        <div class="personnel-title">Personnel</div>

        <div class="desktop-view">
            <div class="table-wrap">
                <table id="workerTable">
                    <thead>
                        <tr>
                            <th class="col-name">Name</th>
                            <th class="col-position">Position</th>
                            <th class="col-rating">Overall Rating</th>
                            <th class="col-comments">Comments</th>
                        </tr>
                    </thead>
                    <tbody id="workerBodyDesktop"></tbody>
                </table>
            </div>
        </div>

        <div class="mobile-view" id="workerBodyMobile"></div>

        <div class="actions">
            <button type="submit" class="save-btn" id="saveBtn">Save Ratings</button>
        </div>

        <div id="submitMessage" class="submit-message"></div>
        <input type="hidden" name="submission_token" id="submissionToken">

    </form>
</div>

<!-- ================= 原始 worker 加载逻辑（不动） ================= -->
<script>
const jobSelect = document.getElementById("jobSelect");
const workerBodyDesktop = document.getElementById("workerBodyDesktop");
const workerBodyMobile = document.getElementById("workerBodyMobile");
const supervisorList = document.getElementById("supervisorList");

function escapeHtml(value) {
    if (value === null || value === undefined) return "";
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function renderDesktopEmpty(message) {
    workerBodyDesktop.innerHTML = `
        <tr>
            <td colspan="4" class="empty-note">${escapeHtml(message)}</td>
        </tr>
    `;
}

function renderMobileEmpty(message) {
    workerBodyMobile.innerHTML = `
        <div class="empty-note mobile-empty">${escapeHtml(message)}</div>
    `;
}

function ratingOptions(name) {
    return `
        <select name="${name}" class="rating-select">
            <option value=""></option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
    `;
}

function renderWorkers(workers) {
    workerBodyDesktop.innerHTML = "";
    workerBodyMobile.innerHTML = "";

    if (!workers || workers.length === 0) {
        renderDesktopEmpty("No workers found for this shutdown");
        renderMobileEmpty("No workers found for this shutdown");
        return;
    }

    workers.forEach((w) => {
        const safeName = escapeHtml(w.Name || "");
        const safePosition = escapeHtml(w.Position || "");

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>
                ${safeName}
                <input type="hidden" name="name" value="${safeName}">
            </td>
            <td>
                ${safePosition}
                <input type="hidden" name="position" value="${safePosition}">
            </td>
            <td>
                ${ratingOptions("overall_rating")}
            </td>
            <td>
                <input type="text" name="comments" class="comments-input" placeholder="Optional comments">
            </td>
        `;
        workerBodyDesktop.appendChild(tr);

        const card = document.createElement("div");
        card.className = "worker-card";
        card.innerHTML = `
            <div class="worker-card-head">
                <div class="worker-name">${safeName}</div>
                <div class="worker-position">${safePosition}</div>
                <input type="hidden" name="name" value="${safeName}">
                <input type="hidden" name="position" value="${safePosition}">
            </div>

            <div class="worker-field">
                <label>Overall Rating</label>
                ${ratingOptions("overall_rating")}
            </div>

            <div class="worker-field">
                <label>Comments</label>
                <input type="text" name="comments" class="comments-input" placeholder="Optional comments">
            </div>
        `;
        workerBodyMobile.appendChild(card);
    });
}

jobSelect.addEventListener("change", async function () {
    const job = this.value;

    if (!job) {
        workerBodyDesktop.innerHTML = "";
        workerBodyMobile.innerHTML = "";
        supervisorList.innerHTML = "";
        return;
    }

    renderDesktopEmpty("Loading workers...");
    renderMobileEmpty("Loading workers...");

    try {
        const res = await fetch(`/get_project_data?project=${encodeURIComponent(job)}`);
        const data = await res.json();

        renderWorkers(data.workers || []);

        supervisorList.innerHTML = "";

        const allPeople = [...(data.leaders || []), ...(data.workers || [])];
        const seen = new Set();

        allPeople.forEach(p => {
            const name = p?.Name?.trim();
            if (!name || seen.has(name)) return;
            seen.add(name);

            const option = document.createElement("option");
            option.value = name;
            supervisorList.appendChild(option);
        });

    } catch (err) {
        renderDesktopEmpty("Failed to load workers");
        renderMobileEmpty("Failed to load workers");
    }
});
</script>

<!-- ================= ⭐ 只改这里（submit逻辑） ================= -->
<script>
const ratingForm = document.getElementById("ratingForm");
const saveBtn = document.getElementById("saveBtn");
const submitMessage = document.getElementById("submitMessage");
const submissionToken = document.getElementById("submissionToken");

let isSubmitting = false;

function generateSubmissionToken() {
    return Date.now().toString() + "_" + Math.random().toString(36).slice(2);
}

submissionToken.value = generateSubmissionToken();

ratingForm.addEventListener("submit", function (e) {
    e.preventDefault();

    if (isSubmitting) return;

    isSubmitting = true;
    saveBtn.disabled = true;
    saveBtn.innerText = "Saving...";

    try {
        const formData = new FormData(ratingForm);

        const payload = [];
        for (const [key, value] of formData.entries()) {
            payload.push([key, value]);
        }

        sessionStorage.setItem("pendingSubmission", JSON.stringify(payload));

        // ⭐ 核心：立刻跳转
        window.location.href = "/processing";

    } catch (err) {
        console.error(err);
        saveBtn.disabled = false;
        saveBtn.innerText = "Save Ratings";
        isSubmitting = false;
    }
});
</script>

</body>
</html>
